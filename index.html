<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Clips Player</title>
    <!-- <script type="text/javascript" src="assets/js/jquery-3.2.1.min.js"></script> -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <script type="text/javascript" src="assets/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="assets/css/home.css" />
    <script type="text/javascript" src="assets/js/main.js"></script>
</head>

<body>
    <div class="col-lg-6" id="text-box">
        <h1 class="page-name">Clips Player</h1>
        <p>
            Clips Player supports "<b><i>.mp4, .webm, .m3u8</i></b>" video url.
        </p>

        <div class="input-group">
            <input type="text" class="form-control" placeholder="Paste the video link here" id="m3u8-placeholder" />
            <span class="input-group-btn">
                <button class="btn btn-primary" type="button" id="play-btn">Play</button>
            </span>
            <span class="input-group-btn">
                <button class="btn btn-dark" type="button" id="artplay-btn">ArtPlay</button>
            </span>
        </div>
    </div>
</body>

</html>
