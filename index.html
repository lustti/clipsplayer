<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Clips Player</title>
    <!-- <script type="text/javascript" src="assets/js/jquery-3.2.1.min.js"></script> -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <script type="text/javascript" src="assets/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="assets/css/style.css" />
    <script type="text/javascript" src="assets/js/main.js"></script>
    <link rel="icon" href="/assets/favicon.png" type="image/x-icon">
</head>

<body>
    <div class="container-fluid justify-content-center gap-1 w-80" id="text-box">
        <h1 class="page-name">Clips Player</h1>

        <hr class="border border-black" />
        <form>
            <div class="input-group mb-3 border border-primary border-2 rounded-3">
                <span class="input-group-text" id="basic-addon1">Video</span>
                <input type="text" class="form-control " placeholder="Paste the video link here, supports video: mp4, .webm, .m3u8." id="video-placeholder"
                    aria-label="Paste the video link here" aria-describedby="basic-addon1">
            </div>
            <div class="input-group mb-3 border border-info border-2 rounded-3 pb-0 mb-0">
                <span class="input-group-text" id="basic-addon1">Subtitle</span>
                <input type="text" class="form-control " placeholder="Paste the subtitle link here, support subtitle: .vtt, .srt."
                    id="subtitle-placeholder" aria-label="Paste the subtitle link here" aria-describedby="basic-addon1">
            </div>
        </form>
        <hr class="border border-dark" />
        <div class="hstack gap-3">
            <div class="input-group d-flex justify-content-start flex-col gap-1 m-2">
                <span class="input-group-btn">
                    <button class="btn btn-success" type="button" id="play-btn">Play</button>
                </span>
            </div>
            <div class="vr border border-danger"></div>
            <div class="input-group d-flex justify-content-end flex-col gap-1 m-2">
                <span class="input-group-btn">
                    <button class="btn btn-danger" type="button" id="artplayer-btn">ArtPlayer</button>
                </span>
            </div>
        </div>
    </div>
</body>

</html>
